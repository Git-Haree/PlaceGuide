# ===================================================
# PlaceIQ - Application Properties
# ===================================================

# Server
server.port=${PORT:8080}

# Serve frontend files from /frontend folder at root URL (fixes localhost:8080)
spring.web.resources.static-locations=file:frontend/,classpath:/static/
spring.mvc.static-path-pattern=/**

# ---- DATABASE SETTINGS ----
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQL_DATABASE:${MYSQLDATABASE:placeiq_db}}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:20112005}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Ensure tables are created before data.sql runs
spring.jpa.defer-datasource-initialization=true

# SQL Init - seed data
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# Gemini API Key - get free key at https://aistudio.google.com
gemini.api.key=AIzaSyB2DBG6R1Fapab1-2Sd056hSbGiNmK-XFY

# Logging
logging.level.com.placeiq=INFO
logging.level.org.springframework.web=WARN
